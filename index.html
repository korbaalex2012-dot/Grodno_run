<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grodno Run</title>
    <!-- Легкие и стабильные стили Tailwind -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <script src="https://telegram.org"></script>
    <style>
        body { 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); 
            color: #f8fafc; 
            font-family: system-ui, -apple-system, sans-serif; 
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-4 min-h-screen text-slate-100">

    <!-- 0. ВХОДНОЙ ЭКРАН: ВЫБОР ПОЛА И ВОЗРАСТА -->
    <div id="auth-screen" class="tab-content active max-w-md mx-auto pt-10">
        <div class="text-center mb-8">
            <span class="text-xs font-bold text-indigo-400 uppercase tracking-wider">Добро пожаловать</span>
            <h2 class="text-3xl font-black text-white mt-1">GRODNO RUN</h2>
            <p class="text-sm text-slate-400 mt-2">Укажи свои данные, чтобы радар настроился под твой возраст</p>
        </div>

        <div class="bg-gray-900 bg-opacity-60 p-6 rounded-3xl border border-gray-800 space-y-6">
            <!-- Выбор Пола -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Твой пол</label>
                <div class="grid grid-cols-2 gap-3">
                    <button type="button" id="gender-male" onclick="setAuthGender('Парень')" class="w-full bg-gray-800 hover:bg-gray-700 py-4 rounded-xl font-bold border border-gray-700 active:bg-indigo-600 text-white">Парень</button>
                    <button type="button" id="gender-female" onclick="setAuthGender('Девушка')" class="w-full bg-gray-800 hover:bg-gray-700 py-4 rounded-xl font-bold border border-gray-700 active:bg-indigo-600 text-white">Девушка</button>
                </div>
            </div>

            <!-- Ввод Возраста -->
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Сколько тебе лет?</label>
                <input type="number" id="user-age" placeholder="Например: 16" min="12" max="35" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-4 text-white text-lg text-center font-bold focus:outline-none focus:border-indigo-500">
            </div>

            <button onclick="submitAuth()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-xl font-black text-base shadow-lg transition-all">
                Войти в приложение
            </button>
        </div>
    </div>

    <!-- ГЛАВНЫЙ БЛОК ПРИЛОЖЕНИЯ -->
    <div id="main-app" class="hidden">
        <header class="flex justify-between items-center mb-6 pb-4 border-b border-gray-800">
            <div class="flex flex-col">
                <span class="text-xs font-bold text-indigo-400 uppercase tracking-wider">Локатор сборов</span>
                <h1 class="text-2xl font-black text-white tracking-tight">GRODNO RUN</h1>
            </div>
            <button id="admin-nav-btn" onclick="switchTab('admin-screen')" class="hidden bg-red-600 text-white text-xs px-4 py-2 rounded-xl font-black uppercase tracking-wider">
                Модерация
            </button>
        </header>

        <!-- 1. ЛЕНТА ГУЛЯНОК -->
        <div id="feed-screen" class="tab-content">
            <div class="space-y-4 mb-24">
                <div id="parties-list" class="space-y-4">
                    <div class="text-center text-gray-500 py-12 text-sm font-medium">Поиск активных сборов...</div>
                </div>
            </div>

            <div class="fixed bottom-6 left-4 right-4 z-50">
                <button onclick="switchTab('create-screen')" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-bold text-lg shadow-xl active:scale-95 transition-all border border-indigo-400/20">
                    Создать сбор
                </button>
            </div>
                    <!-- 2. СОЗДАНИЕ ГУЛЯНКИ -->
        <div id="create-screen" class="tab-content mb-12">
            <div class="flex items-center mb-6">
                <button onclick="switchTab('feed-screen')" class="bg-gray-800 w-10 h-10 rounded-xl flex items-center justify-center font-bold text-xl mr-3 text-gray-400">←</button>
                <h2 class="text-xl font-bold text-white">Параметры сбора</h2>
            </div>
            
            <form id="create-party-form" class="space-y-5 bg-gray-900 p-5 rounded-2xl border border-gray-800">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Где собираемся</label>
                    <select id="party-location" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3.5 text-white text-base focus:outline-none">
                        <option value="Центр (Советская)">Центр (Советская улица)</option>
                        <option value="ТРК Тринити">ТРК Тринити</option>
                        <option value="Грандичи">Грандичи</option>
                        <option value="Ольшанка">Ольшанка</option>
                        <option value="Девятовка">Девятовка</option>
                        <option value="Вишневец">Вишневец</option>
                        <option value="Пышки">Пышки (Парк)</option>
                        <option value="БЛК / Форты">БЛК / Форты</option>
                        <option value="Парк Жилибера">Парк Жилибера</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Цель сбора</label>
                    <select id="party-tag" class="w-full bg-gray-800 border border-gray-700 rounded-xl p-3.5 text-white text-base focus:outline-none">
                        <option value="Прогулка / Чилл">Прогулка / Чилл</option>
                        <option value="Футбол / Спорт">Футбол / Спорт</option>
                        <option value="Катка на самокатах / Вело">Катка на самокатах / Вело</option>
                        <option value="Компьютерный клуб / Настолки">Компьютерный клуб / Настолки</option>
                        <option value="Движ / Вечеринка">Движ / Вечеринка</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Возрастной диапазон</label>
                    <div class="flex gap-3">
                        <input type="number" id="age-min" placeholder="От" min="12" max="35" class="w-1/2 bg-gray-800 border border-gray-700 rounded-xl p-3 text-center text-base" required>
                        <input type="number" id="age-max" placeholder="До" min="12" max="35" class="w-1/2 bg-gray-800 border border-gray-700 rounded-xl p-3 text-center text-base" required>
                    </div>
                </div>

                <div class="flex items-center justify-between bg-gray-800 p-3.5 rounded-xl">
                    <span class="text-sm font-medium text-gray-300">Я иду не один (со мной друг)</span>
                    <input type="checkbox" id="with-friend" class="w-6 h-6 rounded accent-indigo-500">
                </div>

                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Кто нужен в компанию</label>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gray-800 p-4 rounded-xl flex flex-col items-center">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Парни</span>
                            <div class="flex items-center gap-4">
                                <button type="button" onclick="changeCount('need-boys', -1)" class="w-10 h-10 bg-gray-700 rounded-xl text-xl font-bold flex items-center justify-center text-white">-</button>
                                <span id="need-boys" class="text-xl font-black text-white w-4 text-center">0</span>
                                <button type="button" onclick="changeCount('need-boys', 1)" class="w-10 h-10 bg-gray-700 rounded-xl text-xl font-bold flex items-center justify-center text-white">+</button>
                            </div>
                        </div>
                        <div class="bg-gray-800 p-4 rounded-xl flex flex-col items-center">
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Девушки</span>
                            <div class="flex items-center gap-4">
                                <button type="button" onclick="changeCount('need-girls', -1)" class="w-10 h-10 bg-gray-700 rounded-xl text-xl font-bold flex items-center justify-center text-white">-</button>
                                <span id="need-girls" class="text-xl font-black text-white w-4 text-center">0</span>
                                <button type="button" onclick="changeCount('need-girls', 1)" class="w-10 h-10 bg-gray-700 rounded-xl text-xl font-bold flex items-center justify-center text-white">+</button>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-green-600 hover:bg-green-500 text-white py-4 rounded-xl font-bold text-base shadow-lg transition-all mt-4">
                    Запустить радар сбора
                </button>
            </form>
        </div>

        <!-- 3. АДМИНКА -->
        <div id="admin-screen" class="tab-content">
            <div class="flex items-center mb-6">
                <button onclick="switchTab('feed-screen')" class="bg-slate-800 w-10 h-10 rounded-xl flex items-center justify-center font-bold text-xl mr-3 text-slate-400">←</button>
                <h2 class="text-xl font-bold text-red-400">Панель модерации жалоб</h2>
            </div>
            <div id="reports-list" class="space-y-4">
                <div class="text-center text-gray-500 py-12 text-sm">Жалоб нет. На районе всё спокойно!</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

        </div>
